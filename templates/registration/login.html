{% extends 'base.html' %}

{% block title %}Ingresar{% endblock %}

{% block content %}
<div class="login-panel">
    <h1>Ingresar</h1>
    <form method="post" class="stack-form">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <div>
            <label for="{{ form.username.id_for_label }}" class="form-label">Usuario</label>
            {{ form.username }}
        </div>
        <div>
            <label for="{{ form.password.id_for_label }}" class="form-label">Contrasena</label>
            {{ form.password }}
        </div>
        <button class="btn btn-primary w-100" type="submit">Entrar</button>
    </form>
</div>
{% endblock %}
